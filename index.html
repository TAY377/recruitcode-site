
         <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecruitCode</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
}

.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

img {
  border-radius: 10px;
}

button {
  padding: 10px 15px;
  margin-top: 10px;
  cursor: pointer;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>RecruitCode</h1>

<div class="hero">

<div>
<h2>One profile. One scan.</h2>
<p>Everything a coach needs in one place.</p>

<button onclick="showVisitor()">View Athlete</button>
<button onclick="showOwner()">Owner Dashboard</button>
</div>

<div class="card">
<h3>Featured Athlete</h3>

<img id="featuredPreview" src="ronald.jpg" width="120">

<p><strong>Ronald Clark</strong></p>
<p>PG • Class of 2026</p>

<button onclick="showVisitor()">Open Profile</button>
</div>

</div>

<!-- VISITOR VIEW -->
<div id="visitor" class="hidden">

<h2>Ronald Clark</h2>

<img id="mainProfilePhoto" src="ronald.jpg" width="200">

<p>Point Guard • Impact Christian Academy</p>
<p>GPA: 3.3</p>

<h3>Stats</h3>
<p>PPG: 13.0 | APG: 2.9 | RPG: 2.8</p>

<h3>Film</h3>
<a href="https://www.instagram.com/reel/DLgeqcWtUw8/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==" target="_blank">
Watch Highlights
</a>

<h3>QR Code</h3>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https%3A%2F%2Ftay377.github.io%2Frecruitcode-site%2F%23visitor" />

</div>

<!-- OWNER DASHBOARD -->
<div id="owner" class="hidden">

<h2>Owner Dashboard</h2>

<input type="file" id="upload">

<button onclick="save()">Save</button>

</div>

</div>

<script>

function showVisitor() {
  document.getElementById("visitor").classList.remove("hidden");
  document.getElementById("owner").classList.add("hidden");
}

function showOwner() {
  document.getElementById("owner").classList.remove("hidden");
  document.getElementById("visitor").classList.add("hidden");
}

document.getElementById("upload").addEventListener("change", function(e){
  const reader = new FileReader();
  reader.onload = function(event) {
    localStorage.setItem("photo", event.target.result);
    document.getElementById("mainProfilePhoto").src = event.target.result;
    document.getElementById("featuredPreview").src = event.target.result;
  };
  reader.readAsDataURL(e.target.files[0]);
});

function save() {
  alert("Saved! (stays on this browser)");
}

window.onload = function() {
  const saved = localStorage.getItem("photo");
  if(saved){
    document.getElementById("mainProfilePhoto").src = saved;
    document.getElementById("featuredPreview").src = saved;
  }
};

</script>

</body>
</html>
